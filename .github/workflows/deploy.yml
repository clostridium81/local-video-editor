name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Pages 公開に必要な権限のみ付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行で取り合わないように
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npx vite build
        # vite.config.ts の base はリポジトリ名にハードコードしてあるが、
        # 将来 fork した先で名前が違う場合は VITE_BASE 環境変数で上書き可能。

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
